<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <link rel="shortcut icon" href="./assets/about.png" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <!-- HEADER -->
    <header class="shadow-sm bg-green-700">
      <div class="navbar container mx-auto">
        <div class="navbar-start">
          <div class="dropdown">
            <div
              tabindex="0"
              role="button"
              class="btn btn-ghost lg:hidden text-white"
            >
              <i class="fa-solid fa-bars"></i>
            </div>

            <ul
              tabindex="0"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow"
            >
              <li><a class="font-semibold">About</a></li>
              <li><a class="font-semibold">Gallery</a></li>
              <li><a class="font-semibold">Plant a Tree</a></li>
            </ul>
          </div>

          <a href="#" class="text-xl text-white font-bold ml-2">
            Green Earth
          </a>
        </div>

        <!-- Desktop Menu -->
        <div class="navbar-center hidden lg:flex">
          <ul class="flex gap-4 menu-horizontal px-1 text-white">
            <li><a class="font-semibold">About</a></li>
            <li><a class="font-semibold">Gallery</a></li>
            <li><a class="font-semibold">Plant a Tree</a></li>
          </ul>
        </div>

        <div class="navbar-end">
          <a class="btn btn-warning text-green-600 rounded-full">
            Plant a Tree
          </a>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <main class="bg-green-100 py-10 md:py-0">
      <div
        class="container mx-auto flex justify-between items-center px-4 md:px-0 py-5 lg:py-0"
      >
        <figure class="hidden lg:flex">
          <img src="./assets/hero-leaf1.png" alt="" />
        </figure>

        <div class="text-center space-y-5">
          <h1 class="text-3xl md:text-4xl font-bold">
            Plant a Tree, Grow a Future
          </h1>
          <p>
            Join our mission to plant 1 million trees and make the Earth greener
            for future generations.
          </p>
          <a class="btn btn-warning text-green-600 rounded-full">
            Get Involved
          </a>
        </div>

        <figure class="hidden lg:flex">
          <img src="./assets/hero-leaf2.png" alt="" />
        </figure>
      </div>
    </main>
    <!-- MODAL -->
    <div id="modal-container"></div>

    <!-- Plant a Tree Today FORM -->
    <section class="bg-green-800 py-16 px-6 text-center">
      <h2 class="text-2xl font-bold text-white mb-6">Plant a Tree Today</h2>

      <div class="max-w-md mx-auto bg-green-700 rounded-xl shadow p-8">
        <form class="space-y-4">
          <input
            type="text"
            placeholder="Your Name"
            class="w-full p-3 rounded-md bg-white"
          />
          <input
            type="email"
            placeholder="Your Email"
            class="w-full p-3 rounded-md bg-white"
          />

          <select class="w-full p-3 rounded-md bg-white">
            <option>Number of Trees</option>
            <option>1</option>
            <option>5</option>
            <option>10</option>
          </select>

          <button class="w-full bg-yellow-400 py-3 rounded-md">
            <i class="fa-solid fa-hand-holding-heart mr-2"></i> Donate Now
          </button>
        </form>
      </div>
    </section>
    <!-- FOOTER -->
    <footer class="bg-green-900 text-center py-4 text-white text-sm">
      © 2025 Green Earth. All Rights Reserved.
    </footer>
  </body>
</html>
